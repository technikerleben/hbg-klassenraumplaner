<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Klassenraum 3D</title>
<style>
:root{--rot:#791d22;--blau:#245688;--blau-dunkel:#163a5c;--blau-blass:#cbdbe9;--gruen:#3f6b4d;--papier:#f7f5f2;--linie:#d9d5cf;--text:#2b2b2b;--leise:#6b6b6b}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:"Glacial Indifference","Helvetica Neue",Arial,sans-serif;background:linear-gradient(#eff4f9,#f7f5f2);color:var(--text)}#stage{position:fixed;inset:0}canvas{display:block}.tools{position:absolute;right:16px;top:82px;z-index:3;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;max-width:62vw}.tools button{border:1px solid var(--linie);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.94);color:var(--text);font:600 12px inherit;cursor:pointer;box-shadow:0 4px 14px rgba(22,58,92,.08)}.tools button.active{background:var(--blau);border-color:var(--blau);color:#fff}.info{position:absolute;left:16px;bottom:16px;z-index:3;width:270px;padding:13px 15px;border:1px solid var(--linie);border-radius:12px;background:rgba(255,255,255,.94);box-shadow:0 8px 24px rgba(22,58,92,.12)}.info label{display:grid;gap:5px;margin-bottom:10px}.info label span{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--leise);font-weight:700}.info select{width:100%;padding:8px;border:1px solid var(--linie);border-radius:7px;background:var(--papier);font:inherit}.row{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;line-height:1.6}.row span{color:var(--leise)}.row strong{color:var(--blau-dunkel)}.hint{margin:9px 0 0;padding-top:8px;border-top:1px solid var(--linie);font-size:11px;line-height:1.45;color:var(--leise)}.badge{position:absolute;left:50%;bottom:16px;z-index:3;transform:translateX(-50%);padding:7px 14px;border-radius:999px;background:rgba(22,58,92,.9);color:#fff;font-size:11px;font-weight:700}.loading{position:absolute;inset:0;z-index:5;display:grid;place-content:center;text-align:center;background:linear-gradient(#eff4f9,#f7f5f2)}.loading h1{margin:0 0 8px;color:var(--rot);font-size:24px}.loading p{margin:0;color:var(--leise)}.hidden{display:none!important}@media(max-width:640px){.tools{left:8px;right:8px;top:78px;max-width:none;justify-content:flex-start}.tools button{padding:7px 9px}.info{left:8px;bottom:66px;width:220px}.badge{display:none}}
</style>
</head>
<body>
<div id="stage"></div>
<div class="tools" id="tools">
<button class="active" data-view="orbit">Frei</button><button data-view="teacher">Von der Tafel</button><button data-view="back">Aus der Klasse</button><button data-view="top">Vogelperspektive</button>
</div>
<aside class="info" id="info">
<label><span>Variante</span><select id="variant"></select></label>
<div class="row"><span>Raum</span><strong id="room">–</strong></div><div class="row"><span>Fläche</span><strong id="area">–</strong></div><div class="row"><span>Lernplätze</span><strong id="places">–</strong></div><div class="row"><span>Objekte</span><strong id="objects">–</strong></div>
<p class="hint">Mit Maus oder Touch drehen, zoomen und verschieben. Bearbeitet wird weiterhin in der 2D-Ansicht.</p>
</aside>
<div class="badge">3D-Vorschau · direkt mit dem aktuellen Plan verbunden</div>
<div class="loading" id="loading"><div><h1>3D-Ansicht wird vorbereitet</h1><p>Der aktuelle Klassenraum wird direkt übernommen.</p></div></div>
<script type="importmap">{"imports":{"three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
const C={rot:0x791d22,blauDunkel:0x163a5c,blau:0x245688,blauBlass:0xcbdbe9,gruen:0x3f6b4d,gruenDunkel:0x2f4a38,papier:0xf7f5f2,wand:0xf0ede7,boden:0xfbfaf8,tafel:0x1e3b2e};
const stage=document.getElementById('stage');let project=null,roomGroup=null,dims={w:900,l:700};
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.outputColorSpace=THREE.SRGBColorSpace;stage.appendChild(renderer.domElement);
const scene=new THREE.Scene();scene.background=new THREE.Color(0xeff4f9);scene.fog=new THREE.Fog(0xeff4f9,1500,4300);
const camera=new THREE.PerspectiveCamera(50,1,1,8000);const controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=.08;controls.minDistance=120;controls.maxDistance=3600;controls.maxPolarAngle=Math.PI/2-.015;
scene.add(new THREE.HemisphereLight(0xffffff,0xe7e2da,1.05));const sun=new THREE.DirectionalLight(0xffffff,1.05);sun.position.set(600,1400,500);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.near=100;sun.shadow.camera.far=4000;sun.shadow.camera.left=-1700;sun.shadow.camera.right=1700;sun.shadow.camera.top=1700;sun.shadow.camera.bottom=-1700;scene.add(sun);const fill=new THREE.DirectionalLight(C.blauBlass,.35);fill.position.set(-500,700,-450);scene.add(fill);
function resize(){const r=stage.getBoundingClientRect();renderer.setSize(Math.max(1,r.width),Math.max(1,r.height),false);camera.aspect=Math.max(1,r.width)/Math.max(1,r.height);camera.updateProjectionMatrix()}new ResizeObserver(resize).observe(stage);resize();
function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera)}animate();
function mat(color,extra={}){return new THREE.MeshStandardMaterial({color,roughness:.82,metalness:.02,...extra})}
function color(o,fallback){return typeof o.color==='string'&&/^#[0-9a-f]{6}$/i.test(o.color)?parseInt(o.color.slice(1),16):fallback}
function shape(o){if(o.shape)return o.shape;if(o.catalogId==='desk-trapezoid')return'trapezoid';if(['desk-group-round','stool','plant','waste-bin'].includes(o.catalogId))return'round';if(o.catalogId==='beanbag')return'ellipse';if(o.catalogId==='bench')return'bench';if(o.catalogId==='acoustic-sofa')return'sofa';return'rect'}
function height(o){const map={chair:88,stool:45,bench:82,beanbag:45,'floor-cushion':12,'teacher-desk':75,lectern:110,'standing-table':105,'shelf-high':190,'cabinet-high':190,'shelf-low':80,'cabinet-low':80,wardrobe:180,'material-cart':90,'charging-station':90,'digital-board':120,'wall-board':120,pinboard:120,'mobile-board':180,'room-divider':150,'acoustic-sofa':130,'learning-island':74,plant:120,'waste-bin':55,washbasin:85,'wet-counter-120':90,'wet-counter-180':90,window:140,door:200,heater:60};return map[o.catalogId]??(o.category==='tables'?74:o.category==='storage'?(o.properties?.tall?190:80):o.kind==='zone'?1:o.properties?.tall?150:75)}
function base(o){return['digital-board','wall-board','pinboard'].includes(o.catalogId)?85:o.catalogId==='window'?90:0}
function trap(w,d){const hw=w/2,hd=d/2,sh=w/4,s=new THREE.Shape();s.moveTo(-hw,-hd);s.lineTo(hw,-hd);s.lineTo(sh,hd);s.lineTo(-sh,hd);s.closePath();return s}
function leg(x,z,h,r=2.7){const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,8),mat(0x85817c,{roughness:.62,metalness:.18}));m.position.set(x,h/2,z);m.castShadow=true;return m}
function chair(w=42,d=46,c=C.gruen){const g=new THREE.Group(),seatH=46,total=88,s=new THREE.Mesh(new THREE.BoxGeometry(w,4,d),mat(c,{roughness:.64}));s.position.y=seatH;s.castShadow=true;g.add(s);const b=new THREE.Mesh(new THREE.BoxGeometry(w,total-seatH,4),mat(c,{roughness:.64}));b.position.set(0,seatH+(total-seatH)/2,-d/2+2);b.castShadow=true;g.add(b);const hw=w/2-4,hd=d/2-4;[[-hw,-hd],[hw,-hd],[hw,hd],[-hw,hd]].forEach(([x,z])=>g.add(leg(x,z,seatH,2.2)));return g}
function seats(g,o){const n=o.places??0;if(!n||['chair','stool'].includes(o.catalogId))return;const arr=[];if(n<=2){for(let i=0;i<n;i++)arr.push({x:(i-(n-1)/2)*Math.min(58,o.widthCm/n),z:o.depthCm/2+29,r:Math.PI})}else{const south=Math.ceil(n/2),north=n-south;for(let i=0;i<south;i++)arr.push({x:(i-(south-1)/2)*Math.min(52,o.widthCm/south),z:o.depthCm/2+29,r:Math.PI});for(let i=0;i<north;i++)arr.push({x:(i-(north-1)/2)*Math.min(52,o.widthCm/Math.max(1,north)),z:-o.depthCm/2-29,r:0})}arr.forEach(p=>{const c=chair(38,42);c.position.set(p.x,0,p.z);c.rotation.y=p.r;g.add(c)})}
function table(o){const g=new THREE.Group(),h=height(o),s=shape(o),c=color(o,0xc9a66b),t=4,ins=7;if(s==='trapezoid'){const geo=new THREE.ExtrudeGeometry(trap(o.widthCm,o.depthCm),{depth:t,bevelEnabled:false});geo.rotateX(-Math.PI/2);const top=new THREE.Mesh(geo,mat(c,{roughness:.58}));top.position.y=h-t;top.castShadow=true;g.add(top);const hw=o.widthCm/2,hd=o.depthCm/2,sh=o.widthCm/4;[[-hw+ins,-hd+ins],[hw-ins,-hd+ins],[sh-ins,hd-ins],[-sh+ins,hd-ins]].forEach(([x,z])=>g.add(leg(x,z,h-t)))}else if(s==='round'){const r=Math.max(o.widthCm,o.depthCm)/2,top=new THREE.Mesh(new THREE.CylinderGeometry(r,r,t,40),mat(c));top.position.y=h-t/2;top.castShadow=true;g.add(top);g.add(leg(0,0,h-t,5))}else{const top=new THREE.Mesh(new THREE.BoxGeometry(o.widthCm,t,o.depthCm),mat(c,{roughness:.58}));top.position.y=h-t/2;top.castShadow=true;g.add(top);const hw=o.widthCm/2-ins,hd=o.depthCm/2-ins;[[-hw,-hd],[hw,-hd],[hw,hd],[-hw,hd]].forEach(([x,z])=>g.add(leg(x,z,h-t)))}seats(g,o);return g}
function wallObject(o){const g=new THREE.Group(),h=height(o),b=base(o),d=Math.max(4,o.depthCm),board=['digital-board','wall-board'].includes(o.catalogId);const material=board?mat(C.tafel,{roughness:.42}):o.catalogId==='window'?mat(0xbfe0f2,{transparent:true,opacity:.48,roughness:.12,side:THREE.DoubleSide}):mat(color(o,C.blau));const mesh=new THREE.Mesh(new THREE.BoxGeometry(o.widthCm,h,d),material);mesh.position.y=b+h/2;mesh.castShadow=o.catalogId!=='window';if(board){const frame=new THREE.Mesh(new THREE.BoxGeometry(o.widthCm+9,h+9,Math.max(3,d-1)),mat(o.properties?.mainBoard?C.rot:0x9aa6af));frame.position.y=mesh.position.y;frame.position.z=-1;g.add(frame)}g.add(mesh);return g}
function generic(o){if(o.catalogId==='chair')return chair(o.widthCm,o.depthCm,color(o,C.gruen));const g=new THREE.Group(),h=height(o),s=shape(o),c=color(o,C.blau);if(o.kind==='zone'||o.kind==='symbol'){const m=new THREE.Mesh(new THREE.BoxGeometry(o.widthCm,1,o.depthCm),mat(o.kind==='symbol'?0xf3e9c8:c,{transparent:o.kind==='zone',opacity:o.kind==='zone'?.3:1}));m.position.y=.6;g.add(m);return g}if(o.catalogId==='plant'){const pot=new THREE.Mesh(new THREE.CylinderGeometry(15,12,30,20),mat(0x8f6d51));pot.position.y=15;g.add(pot);const crown=new THREE.Mesh(new THREE.SphereGeometry(31,24,18),mat(C.gruenDunkel));crown.scale.set(.8,1.25,.8);crown.position.y=78;crown.castShadow=true;g.add(crown);return g}if(s==='sofa'||s==='bench'){const seatH=s==='sofa'?48:8,seatY=s==='sofa'?24:45;const seat=new THREE.Mesh(new THREE.BoxGeometry(o.widthCm,seatH,o.depthCm),mat(c));seat.position.y=seatY;seat.castShadow=true;g.add(seat);const back=new THREE.Mesh(new THREE.BoxGeometry(o.widthCm,s==='sofa'?h-40:36,s==='sofa'?14:7),mat(c));back.position.set(0,s==='sofa'?40+(h-40)/2:64,-o.depthCm/2+(s==='sofa'?7:3.5));g.add(back);return g}let geo;if(s==='round')geo=new THREE.CylinderGeometry(Math.max(o.widthCm,o.depthCm)/2,Math.max(o.widthCm,o.depthCm)/2,h,40);else if(s==='ellipse'){geo=new THREE.CylinderGeometry(1,1,h,40);geo.scale(o.widthCm/2,1,o.depthCm/2)}else geo=new THREE.BoxGeometry(o.widthCm,h,o.depthCm);const m=new THREE.Mesh(geo,mat(c));m.position.y=h/2;m.castShadow=true;m.receiveShadow=true;g.add(m);return g}
function place(o,W,L){const holder=new THREE.Group();holder.add(o.category==='tables'&&o.kind==='furniture'?table(o):o.kind==='wall'?wallObject(o):generic(o));holder.position.set(o.xCm-W/2,0,o.yCm-L/2);holder.rotation.y=-THREE.MathUtils.degToRad(o.rotationDeg||0);return holder}
function dispose(root){root.traverse(x=>{if(x.geometry)x.geometry.dispose();if(x.material)(Array.isArray(x.material)?x.material:[x.material]).forEach(m=>m.dispose())})}
function build(v){if(roomGroup){scene.remove(roomGroup);dispose(roomGroup)}const g=new THREE.Group(),W=v.room.widthCm,L=v.room.lengthCm,ox=W/2,oz=L/2;dims={w:W,l:L};const floor=new THREE.Mesh(new THREE.BoxGeometry(W,6,L),mat(C.boden,{roughness:.96}));floor.position.y=-3;floor.receiveShadow=true;g.add(floor);const grid=new THREE.GridHelper(Math.max(W,L),Math.max(2,Math.round(Math.max(W,L)/50)),C.blauBlass,0xe7e2da);grid.position.y=.5;(Array.isArray(grid.material)?grid.material:[grid.material]).forEach(m=>{m.transparent=true;m.opacity=.42});g.add(grid);const wh=260,wt=8,wm=mat(C.wand,{transparent:true,opacity:.56,side:THREE.DoubleSide,roughness:.96});const wall=(w,d,x,z)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w,wh,d),wm.clone());m.position.set(x,wh/2,z);return m};g.add(wall(W,wt,0,-oz),wall(W,wt,0,oz),wall(wt,L,-ox,0),wall(wt,L,ox,0));v.objects.forEach(o=>{try{g.add(place(o,W,L))}catch(e){console.warn('3D-Objekt übersprungen',o.catalogId,e)}});roomGroup=g;scene.add(g);document.getElementById('room').textContent=`${W} × ${L} cm`;document.getElementById('area').textContent=`${(W*L/10000).toFixed(1)} m²`;document.getElementById('places').textContent=`${v.objects.reduce((s,o)=>s+(o.places||0),0)} von ${project.meta?.targetStudentCount??'–'}`;document.getElementById('objects').textContent=String(v.objects.length);frame('orbit')}
function frame(view){const {w,l}=dims,d=Math.max(w,l);if(view==='teacher'){camera.position.set(0,150,-l/2+70);controls.target.set(0,105,l/2-80)}else if(view==='back'){camera.position.set(0,150,l/2-70);controls.target.set(0,105,-l/2+80)}else if(view==='top'){camera.position.set(0,d*1.35,1);controls.target.set(0,0,0)}else{camera.position.set(w*.58,d*.82,l*.92);controls.target.set(0,62,0)}controls.update()}
document.getElementById('tools').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;document.querySelectorAll('.tools button').forEach(x=>x.classList.remove('active'));b.classList.add('active');frame(b.dataset.view)});
const select=document.getElementById('variant');select.addEventListener('change',()=>{const v=project.variants.find(x=>x.id===select.value)||project.variants[0];build(v);parent.postMessage({type:'HBG_SET_VARIANT',variantId:v.id},location.origin)});
function load(p){if(!p||!Array.isArray(p.variants)||!p.variants.length)return;project=p;select.innerHTML='';p.variants.forEach((v,i)=>{const o=document.createElement('option');o.value=v.id;o.textContent=v.name||`Variante ${i+1}`;select.appendChild(o)});select.value=p.activeVariantId||p.variants[0].id;build(p.variants.find(v=>v.id===select.value)||p.variants[0]);document.getElementById('loading').classList.add('hidden')}
addEventListener('message',e=>{if(e.origin!==location.origin)return;if(e.data?.type==='HBG_PROJECT')load(e.data.project)});parent.postMessage({type:'HBG_3D_READY'},location.origin);
</script>
</body>
</html>
